name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Node dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Start API, then run all stacks (Playwright + Postman + REST Assured)
        run: |
          node api/server.mjs &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/health && break; sleep 1; done
          echo "--- Playwright API (TypeScript) ---"
          npx playwright test
          echo "--- Postman / newman ---"
          npm run postman
          echo "--- REST Assured (Java) ---"
          cd rest-assured && mvn -q -B test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
